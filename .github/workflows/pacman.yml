name: Generate Pac-Man Contribution Graph

on:
    schedule:
        - cron: "0 0 * * *" # Runs every day at midnight
    workflow_dispatch: # Allows manual trigger so you don't have to wait for midnight

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3

            # Step 1: Tell Pac-Man to eat your commits
            - name: Generate Pac-Man Graph
              uses: abozanona/pacman-contribution-graph@v1
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  username: Callmeavi
                  theme: "github-dark"
                  output_format: "svg"

            # Step 2: Push the evidence back to your repo
            - name: Commit and Push
              run: |
                  git config --global user.name 'github-actions[bot]'
                  git config --global user.email 'github-actions[bot]@users.noreply.github.com'
                  git add pacman-contribution-graph.svg
                  git commit -m "Automated update: Added more snacks for Pac-Man 👻" || echo "No changes to commit"
                  git push
